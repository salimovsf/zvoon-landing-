<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zvoon — Звонок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #222;
  --accent: #e8734a;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --text: #f5f5f5;
  --muted: #888;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ─── Join screen ─── */
.join-screen {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.join-box {
  width: 100%;
  max-width: 360px;
  text-align: center;
}

.join-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: 800;
  font-size: 22px;
  margin-bottom: 40px;
  letter-spacing: -0.5px;
}

.join-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}

.join-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 28px;
}

.join-input {
  width: 100%;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid #333;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 14px;
}

.join-input:focus { border-color: var(--accent); }

.join-btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: inherit;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.join-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.join-btn:not(:disabled):hover { opacity: 0.9; }

.join-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

/* ─── Mic status banner ─── */
.mic-banner {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
}

.mic-banner.warning {
  display: flex;
  background: rgba(234, 179, 8, 0.12);
  color: var(--yellow);
}

.mic-banner.error {
  display: flex;
  background: rgba(239, 68, 68, 0.12);
  color: var(--red);
}

/* ─── Call screen ─── */
.call-screen {
  flex: 1;
  display: none;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

.call-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
}

.call-timer {
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-weight: 600;
}

.call-count {
  font-size: 13px;
  color: var(--muted);
}

.call-participants {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.participants-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  max-width: 500px;
}

.participant {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.participant-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  transition: all 0.2s;
  position: relative;
}

.participant-avatar.speaking {
  background: var(--green);
  box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.15);
  transform: scale(1.08);
}

.participant-avatar .muted-badge {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
}

.participant-name {
  font-size: 12px;
  color: var(--muted);
  max-width: 80px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.call-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px 20px 40px;
}

.ctrl-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  gap: 6px;
}

.ctrl-round {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  padding: 0;
}

.ctrl-pill {
  padding: 12px 20px;
  border-radius: 14px;
}

.ctrl-mute {
  background: var(--surface2);
  color: var(--text);
}
.ctrl-mute.muted {
  background: rgba(239, 68, 68, 0.15);
  color: var(--red);
}
.ctrl-mute.no-mic {
  background: rgba(239, 68, 68, 0.08);
  color: #666;
  cursor: not-allowed;
}

.ctrl-copy {
  background: var(--surface2);
  color: var(--muted);
}

.ctrl-leave {
  background: var(--red);
  color: #fff;
}

.ctrl-btn:hover { opacity: 0.85; }

/* ─── Connecting overlay ─── */
.connecting {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 100;
}

.connecting.show { display: flex; }

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.connecting-text {
  font-size: 15px;
  color: var(--muted);
}

/* ─── Share toast ─── */
.share-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 50;
}

.share-toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- Connecting overlay -->
<div class="connecting" id="connecting">
  <div class="spinner"></div>
  <div class="connecting-text" id="connectingText">Подключение...</div>
</div>

<!-- Join screen -->
<div class="join-screen" id="joinScreen">
  <div class="join-box">
    <div class="join-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#e8734a"/>
        <path d="M8 10.5C8 9.67 8.67 9 9.5 9h1C11.33 9 12 9.67 12 10.5v7c0 .83-.67 1.5-1.5 1.5h-1C8.67 19 8 18.33 8 17.5v-7z" fill="#fff"/>
        <path d="M16 10.5c0-.83.67-1.5 1.5-1.5h1c.83 0 1.5.67 1.5 1.5v7c0 .83-.67 1.5-1.5 1.5h-1c-.83 0-1.5-.67-1.5-1.5v-7z" fill="#fff"/>
        <path d="M12 14h4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      Zvoon
    </div>
    <h1 class="join-title" id="joinTitle">Введите имя</h1>
    <p class="join-subtitle" id="joinSubtitle">Вы присоединитесь к звонку</p>
    <input class="join-input" id="nameInput" type="text" placeholder="Ваше имя" maxlength="30" autofocus>
    <button class="join-btn" id="joinBtn" disabled>Войти</button>
    <div class="join-error" id="joinError"></div>
  </div>
</div>

<!-- Call screen -->
<div class="call-screen" id="callScreen">
  <div class="mic-banner" id="micBanner"></div>
  <div class="call-header">
    <div class="call-timer" id="timer">00:00</div>
    <div class="call-count" id="participantCount"></div>
  </div>
  <div class="call-participants">
    <div class="participants-grid" id="participantsGrid"></div>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn ctrl-pill ctrl-copy" id="copyBtn" onclick="copyLink()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copyText">Скопировать</span>
    </button>
    <button class="ctrl-btn ctrl-round ctrl-mute" id="muteBtn" onclick="toggleMute()">
      <svg id="micOn" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="12" rx="3"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <svg id="micOff" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="ctrl-btn ctrl-pill ctrl-leave" id="leaveBtn" onclick="leaveCall()">
      Выйти
    </button>
  </div>
</div>

<!-- Hidden audio container for autoplay unlock -->
<div id="audioContainer" style="display:none"></div>

<div class="share-toast" id="shareToast">Ссылка скопирована</div>

<!-- LiveKit SDK -->
<script src="https://unpkg.com/livekit-client@2.17.2/dist/livekit-client.umd.js"></script>

<script>
const API_URL = 'https://zvoon.kotik.space';
const LIVEKIT_URL = 'wss://livekit.kotik.space';

// Parse URL params
const params = new URLSearchParams(window.location.search);
const roomSlug = params.get('room');
const isHost = params.get('host') === '1';

// State
let room = null;
let isMuted = false;
let micAvailable = false;
let localStream = null;
let timerSeconds = 0;
let timerInterval = null;
let joining = false;

// Elements
const joinScreen = document.getElementById('joinScreen');
const callScreen = document.getElementById('callScreen');
const connectingOverlay = document.getElementById('connecting');
const connectingText = document.getElementById('connectingText');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const joinError = document.getElementById('joinError');
const joinTitle = document.getElementById('joinTitle');
const joinSubtitle = document.getElementById('joinSubtitle');
const micBanner = document.getElementById('micBanner');

// If no room param and not host, show error
if (!roomSlug && !isHost) {
  joinTitle.textContent = 'Нет комнаты';
  joinSubtitle.textContent = 'Перейдите на главную страницу, чтобы создать звонок';
  nameInput.style.display = 'none';
  joinBtn.style.display = 'none';
}

// Enable join button on input
nameInput.addEventListener('input', () => {
  joinBtn.disabled = !nameInput.value.trim();
});

nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && nameInput.value.trim()) joinBtn.click();
});

// ─── Mic permission ───
// Request mic access BEFORE connecting to LiveKit.
// This triggers the browser permission dialog from a user gesture (button click).
// We keep the stream and pass it to LiveKit later.
async function requestMicPermission() {
  // Try multiple audio constraints for max browser compat
  const constraintsList = [
    { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } },
    { audio: { echoCancellation: true, noiseSuppression: true } },
    { audio: true },
  ];

  for (const constraints of constraintsList) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
      micAvailable = true;
      return true;
    } catch (e) {
      console.warn('getUserMedia failed with constraints:', constraints, e.name, e.message);
      // NotAllowedError = user denied permission
      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        return false;
      }
      // NotFoundError = no mic device, try next constraints
      // Other errors = try next
      continue;
    }
  }
  return false;
}

// Stop the preview stream tracks (LiveKit will create its own)
function stopPreviewStream() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
}

// ─── API calls with retry ───
async function apiCall(url, options, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || `Ошибка сервера (${res.status})`);
      }
      return await res.json();
    } catch (e) {
      if (i === retries) throw e;
      // Wait before retry (300ms, 800ms)
      await new Promise(r => setTimeout(r, 300 * (i + 1)));
    }
  }
}

// ─── Safari / iOS autoplay unlock ───
// Safari blocks audio playback until a user gesture.
// We create and play a silent audio context on the join button click.
function unlockAudioPlayback() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    // Also create a silent <audio> to unlock HTMLAudioElement playback
    const audio = document.createElement('audio');
    audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
    audio.play().catch(() => {});
    ctx.resume().catch(() => {});
  } catch (e) {
    // Ignore — not all browsers need this
  }
}

// ─── Join / Create ───
joinBtn.addEventListener('click', async () => {
  const name = nameInput.value.trim();
  if (!name || joining) return;

  joining = true;
  joinBtn.disabled = true;
  joinError.style.display = 'none';

  // 1. Unlock audio playback (Safari/iOS)
  unlockAudioPlayback();

  // 2. Request mic permission FIRST (user gesture context)
  connectingText.textContent = 'Доступ к микрофону...';
  connectingOverlay.classList.add('show');

  const micGranted = await requestMicPermission();
  stopPreviewStream(); // Free the stream, LiveKit will get its own

  if (!micGranted) {
    // Show warning but don't block — user can still listen
    console.warn('Microphone not available or denied');
  }

  // 3. Get token from API
  connectingText.textContent = 'Подключение...';

  try {
    let token, slug;

    if (isHost) {
      const data = await apiCall(`${API_URL}/rooms`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hostName: name }),
      });
      token = data.token;
      slug = data.slug;
      history.replaceState(null, '', `?room=${slug}`);
    } else {
      const data = await apiCall(`${API_URL}/rooms/${roomSlug}/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      token = data.token;
      slug = roomSlug;
    }

    // 4. Connect to LiveKit
    await connectToRoom(token, slug, micGranted);
  } catch (err) {
    connectingOverlay.classList.remove('show');
    joinError.textContent = err.message || 'Не удалось подключиться. Попробуйте ещё раз.';
    joinError.style.display = 'block';
    joinBtn.disabled = false;
    joining = false;
  }
});

async function connectToRoom(token, slug, micGranted) {
  const { Room, RoomEvent, Track, RoomOptions } = LivekitClient;

  room = new Room({
    adaptiveStream: true,
    dynacast: true,
    // Explicit audio output settings for better compat
    audioCaptureDefaults: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true,
    },
    audioOutput: {
      deviceId: 'default',
    },
  });

  // ─── Remote audio tracks ───
  room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
    if (track.kind === Track.Kind.Audio) {
      const el = track.attach();
      el.id = `audio-${participant.sid}`;
      el.setAttribute('autoplay', '');
      el.setAttribute('playsinline', '');
      // Force volume for Safari
      el.volume = 1.0;
      document.getElementById('audioContainer').appendChild(el);
      // Some browsers need explicit play() after attach
      el.play().catch(() => {});
    }
  });

  room.on(RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
    track.detach().forEach(el => el.remove());
    const leftover = document.getElementById(`audio-${participant.sid}`);
    if (leftover) leftover.remove();
  });

  room.on(RoomEvent.ParticipantConnected, () => updateParticipants());
  room.on(RoomEvent.ParticipantDisconnected, () => updateParticipants());
  room.on(RoomEvent.ActiveSpeakersChanged, (speakers) => updateSpeakers(speakers));
  room.on(RoomEvent.TrackMuted, () => updateParticipants());
  room.on(RoomEvent.TrackUnmuted, () => updateParticipants());
  room.on(RoomEvent.Disconnected, () => {
    stopTimer();
    callScreen.style.display = 'none';
    joinScreen.style.display = 'flex';
    joinTitle.textContent = 'Звонок завершён';
    joinSubtitle.textContent = 'Вы можете закрыть эту страницу';
    nameInput.style.display = 'none';
    joinBtn.style.display = 'none';
  });

  // ─── Handle MediaDeviceFailure ───
  room.on(RoomEvent.MediaDevicesError, (e) => {
    console.error('MediaDevicesError:', e);
    showMicBanner('error', 'Микрофон недоступен. Вас не слышно.');
    setMicUI(true, false);
  });

  // Connect
  await room.connect(LIVEKIT_URL, token);

  // Show call UI
  connectingOverlay.classList.remove('show');
  joinScreen.style.display = 'none';
  callScreen.style.display = 'flex';

  // ─── Enable microphone ───
  if (micGranted) {
    try {
      await room.localParticipant.setMicrophoneEnabled(true);
      micAvailable = true;
      isMuted = false;

      // Verify the mic track actually published
      setTimeout(() => {
        const micPub = room.localParticipant.getTrackPublication(Track.Source.Microphone);
        if (!micPub || !micPub.track) {
          console.warn('Mic track not published after enable');
          showMicBanner('warning', 'Микрофон не определён. Попробуйте нажать кнопку микрофона.');
          setMicUI(true, true);
        }
      }, 2000);
    } catch (e) {
      console.error('Failed to enable mic:', e.name, e.message);
      micAvailable = false;
      isMuted = true;

      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        showMicBanner('error', 'Разрешите доступ к микрофону в настройках браузера');
      } else if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
        showMicBanner('error', 'Микрофон не найден. Подключите микрофон и обновите страницу.');
      } else {
        showMicBanner('warning', 'Не удалось включить микрофон. Вас не слышно.');
      }
      setMicUI(true, false);
    }
  } else {
    isMuted = true;
    micAvailable = false;
    showMicBanner('error', 'Разрешите доступ к микрофону в настройках браузера');
    setMicUI(true, false);
  }

  updateParticipants();
  startTimer();
  joining = false;
}

function showMicBanner(type, text) {
  micBanner.textContent = text;
  micBanner.className = 'mic-banner ' + type;
}

function setMicUI(muted, canToggle) {
  isMuted = muted;
  const btn = document.getElementById('muteBtn');
  document.getElementById('micOn').style.display = muted ? 'none' : 'block';
  document.getElementById('micOff').style.display = muted ? 'block' : 'none';
  btn.classList.toggle('muted', muted);
  if (!canToggle) {
    btn.classList.add('no-mic');
  } else {
    btn.classList.remove('no-mic');
  }
}

function updateParticipants() {
  if (!room) return;
  const grid = document.getElementById('participantsGrid');
  const count = document.getElementById('participantCount');
  const all = [room.localParticipant, ...room.remoteParticipants.values()];

  count.textContent = `${all.length} ${all.length === 1 ? 'участник' : all.length < 5 ? 'участника' : 'участников'}`;

  grid.innerHTML = all.map(p => {
    const name = p.identity || 'Гость';
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const micOff = !p.isMicrophoneEnabled;
    const speaking = p.isSpeaking;
    const isLocal = p === room.localParticipant;

    return `
      <div class="participant" data-sid="${p.sid}">
        <div class="participant-avatar ${speaking ? 'speaking' : ''}">
          ${initials}
          ${micOff ? `<div class="muted-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </div>` : ''}
        </div>
        <div class="participant-name">${name}${isLocal ? ' (вы)' : ''}</div>
      </div>
    `;
  }).join('');
}

function updateSpeakers(speakers) {
  if (!room) return;
  document.querySelectorAll('.participant-avatar').forEach(el => el.classList.remove('speaking'));
  const speakerSids = new Set(speakers.map(s => s.sid));
  document.querySelectorAll('.participant').forEach(el => {
    if (speakerSids.has(el.dataset.sid)) {
      el.querySelector('.participant-avatar').classList.add('speaking');
    }
  });
}

async function toggleMute() {
  if (!room) return;

  // If mic was never available, try to request it again
  if (!micAvailable) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      await room.localParticipant.setMicrophoneEnabled(true);
      micAvailable = true;
      isMuted = false;
      micBanner.className = 'mic-banner';
      setMicUI(false, true);
      updateParticipants();
      return;
    } catch (e) {
      console.warn('Still no mic:', e.message);
      return;
    }
  }

  isMuted = !isMuted;
  try {
    await room.localParticipant.setMicrophoneEnabled(!isMuted);
  } catch (e) {
    console.error('Toggle mic failed:', e);
    isMuted = !isMuted; // revert
  }
  setMicUI(isMuted, true);
  updateParticipants();
}

function copyLink() {
  const slug = new URLSearchParams(window.location.search).get('room');
  if (!slug) return;

  const base = window.location.origin + window.location.pathname;
  const link = `${base}?room=${slug}`;

  navigator.clipboard.writeText(link).then(() => {
    const toast = document.getElementById('shareToast');
    toast.classList.add('show');
    document.getElementById('copyText').textContent = 'Скопировано!';
    setTimeout(() => {
      toast.classList.remove('show');
      document.getElementById('copyText').textContent = 'Скопировать';
    }, 2000);
  });
}

function leaveCall() {
  if (room) room.disconnect();
}

function startTimer() {
  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
    const s = (timerSeconds % 60).toString().padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
}
</script>
