<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zvoon — Звонок</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #161616;
  --surface2: #222;
  --accent: #e8734a;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #eab308;
  --text: #f5f5f5;
  --muted: #888;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ─── Screens ─── */
.screen {
  flex: 1;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.screen.active { display: flex; }
.screen-box {
  width: 100%;
  max-width: 380px;
  text-align: center;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: 800;
  font-size: 22px;
  margin-bottom: 40px;
  letter-spacing: -0.5px;
}

.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}

.screen-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.5;
}

.input {
  width: 100%;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid #333;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 14px;
}
.input:focus { border-color: var(--accent); }

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: inherit;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:not(:disabled):hover { opacity: 0.9; }
.btn-secondary {
  background: var(--surface2);
  color: var(--muted);
  margin-top: 10px;
}

.error-text {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  display: none;
}

/* ─── Mic permission screen ─── */
.mic-icon-big {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(232, 115, 74, 0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}

.mic-hint {
  display: none;
  background: var(--surface);
  border: 1px solid #333;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 20px;
  text-align: left;
}
.mic-hint.show { display: block; }

.mic-hint-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--yellow);
}

.mic-hint ol {
  font-size: 13px;
  color: var(--muted);
  padding-left: 20px;
  line-height: 1.7;
}

.browser-icon {
  display: inline-block;
  width: 16px;
  height: 16px;
  vertical-align: middle;
  margin-right: 2px;
}

/* ─── Mic status banner ─── */
.mic-banner {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
}
.mic-banner.warning {
  display: flex;
  background: rgba(234, 179, 8, 0.12);
  color: var(--yellow);
}
.mic-banner.error {
  display: flex;
  background: rgba(239, 68, 68, 0.12);
  color: var(--red);
}

/* ─── Call screen ─── */
.call-screen {
  flex: 1;
  display: none;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}
.call-screen.active { display: flex; }

.call-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
}

.call-timer {
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  font-weight: 600;
}

.call-count { font-size: 13px; color: var(--muted); }

.call-participants {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.participants-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  max-width: 500px;
}

.participant {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.participant-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  transition: all 0.2s;
  position: relative;
}

.participant-avatar.speaking {
  background: var(--green);
  box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.15);
  transform: scale(1.08);
}

.participant-avatar .muted-badge {
  position: absolute;
  bottom: -2px;
  right: -2px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
}

.participant-name {
  font-size: 12px;
  color: var(--muted);
  max-width: 80px;
  text-align: center;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.call-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px 20px 40px;
}

.ctrl-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  gap: 6px;
}

.ctrl-round { width: 56px; height: 56px; border-radius: 50%; padding: 0; }
.ctrl-pill { padding: 12px 20px; border-radius: 14px; }

.ctrl-mute { background: var(--surface2); color: var(--text); }
.ctrl-mute.muted { background: rgba(239, 68, 68, 0.15); color: var(--red); }
.ctrl-mute.no-mic { background: rgba(239, 68, 68, 0.08); color: #666; cursor: not-allowed; }

.ctrl-copy { background: var(--surface2); color: var(--muted); }
.ctrl-leave { background: var(--red); color: #fff; }
.ctrl-btn:hover { opacity: 0.85; }

/* ─── Loading overlay ─── */
.connecting {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 100;
}
.connecting.show { display: flex; }

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.connecting-text { font-size: 15px; color: var(--muted); }

/* ─── Toast ─── */
.share-toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 50;
}
.share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── Pulse animation for mic icon ─── */
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(232, 115, 74, 0.4); }
  70% { box-shadow: 0 0 0 15px rgba(232, 115, 74, 0); }
  100% { box-shadow: 0 0 0 0 rgba(232, 115, 74, 0); }
}
.mic-icon-big.pulsing { animation: pulse-ring 1.5s infinite; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="connecting" id="connecting">
  <div class="spinner"></div>
  <div class="connecting-text" id="connectingText">Подключение...</div>
</div>

<!-- SCREEN 1: Name input -->
<div class="screen active" id="screenName">
  <div class="screen-box">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 512 512" fill="none">
        <rect width="512" height="512" rx="112" fill="url(#cLogoGrad)"/>
        <path d="M152 148h208l-208 216h208" fill="none" stroke="#fff" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M388 200q32 56 0 112" fill="none" stroke="#fff" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
        <defs><linearGradient id="cLogoGrad" x1="0" y1="0" x2="512" y2="512"><stop stop-color="#e8734a"/><stop offset="1" stop-color="#c74f2e"/></linearGradient></defs>
      </svg>
      Zvoon
    </div>
    <h1 class="screen-title" id="nameTitle">Введите имя</h1>
    <p class="screen-subtitle" id="nameSubtitle">Вы присоединитесь к звонку</p>
    <input class="input" id="nameInput" type="text" placeholder="Ваше имя" maxlength="30" autofocus>
    <button class="btn" id="nameBtn" disabled>Далее</button>
    <div class="error-text" id="nameError"></div>
  </div>
</div>

<!-- SCREEN 2: Mic permission -->
<div class="screen" id="screenMic">
  <div class="screen-box">
    <div class="mic-icon-big pulsing" id="micIconBig">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#e8734a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="12" rx="3"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <h1 class="screen-title" id="micTitle">Разрешите микрофон</h1>
    <p class="screen-subtitle" id="micSubtitle">Нажмите <strong>«Разрешить»</strong> во всплывающем окне браузера, чтобы собеседники вас слышали</p>

    <!-- Hint for blocked mic (shown when denied) -->
    <div class="mic-hint" id="micHint">
      <div class="mic-hint-title">Микрофон заблокирован</div>
      <div id="micHintContent"></div>
    </div>

    <button class="btn" id="micRequestBtn">Включить микрофон</button>
    <button class="btn btn-secondary" id="micSkipBtn">Войти без микрофона</button>
    <div class="error-text" id="micError"></div>
  </div>
</div>

<!-- SCREEN 3: Call -->
<div class="call-screen" id="screenCall">
  <div class="mic-banner" id="micBanner"></div>
  <div class="call-header">
    <div class="call-timer" id="timer">00:00</div>
    <div class="call-count" id="participantCount"></div>
  </div>
  <div class="call-participants">
    <div class="participants-grid" id="participantsGrid"></div>
  </div>
  <div class="call-controls">
    <button class="ctrl-btn ctrl-pill ctrl-copy" id="copyBtn" onclick="copyLink()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span id="copyText">Пригласить</span>
    </button>
    <button class="ctrl-btn ctrl-round ctrl-mute" id="muteBtn" onclick="toggleMute()">
      <svg id="micOn" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="12" rx="3"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <svg id="micOff" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="ctrl-btn ctrl-pill ctrl-leave" id="leaveBtn" onclick="leaveCall()">
      Выйти
    </button>
  </div>
</div>

<div id="audioContainer" style="display:none"></div>
<div class="share-toast" id="shareToast">Ссылка на звонок скопирована</div>

<script src="https://unpkg.com/livekit-client@2.17.2/dist/livekit-client.umd.js"></script>

<script>
const API_URL = 'https://api.zvoon.me';
const LIVEKIT_URL = 'wss://livekit.kotik.space';

const urlParams = new URLSearchParams(window.location.search);
const roomSlug = urlParams.get('room');
const isHost = urlParams.get('host') === '1';

let room = null;
let isMuted = false;
let micAvailable = false;
let timerSeconds = 0;
let timerInterval = null;
let userName = '';
let userToken = '';
let userSlug = '';

// ─── Screens ───
function showScreen(id) {
  document.querySelectorAll('.screen, .call-screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── Detect browser ───
function getBrowser() {
  const ua = navigator.userAgent;
  if (ua.includes('OPR') || ua.includes('Opera')) return 'opera';
  if (ua.includes('Firefox')) return 'firefox';
  if (ua.includes('Edg')) return 'edge';
  if (ua.includes('Safari') && !ua.includes('Chrome')) return 'safari';
  return 'chrome'; // Chrome and Chromium-based
}

function isMobile() {
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}

function getMicBlockedInstructions() {
  const browser = getBrowser();
  const mobile = isMobile();

  if (mobile) {
    if (browser === 'safari') return t('safari_mobile');
    return t('mobile_default');
  }
  if (browser === 'safari') return t('safari_desktop');
  if (browser === 'firefox') return t('firefox');
  if (browser === 'opera') return t('opera');
  return t('chrome_default');
}

// ─── Check permission status via Permissions API ───
async function checkMicPermission() {
  try {
    if (navigator.permissions && navigator.permissions.query) {
      const result = await navigator.permissions.query({ name: 'microphone' });
      return result.state; // 'granted', 'denied', 'prompt'
    }
  } catch (e) {
    // Safari doesn't support permissions.query for microphone
  }
  return 'unknown';
}

// ─── API calls with retry ───
async function apiCall(url, options, retries = 2) {
  for (let i = 0; i <= retries; i++) {
    try {
      const res = await fetch(url, options);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || `Server error (${res.status})`);
      }
      return await res.json();
    } catch (e) {
      if (i === retries) throw e;
      await new Promise(r => setTimeout(r, 300 * (i + 1)));
    }
  }
}

// ─── Safari autoplay unlock ───
function unlockAudioPlayback() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    ctx.resume().catch(() => {});
    const audio = document.createElement('audio');
    audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
    audio.play().catch(() => {});
  } catch (e) {}
}

// ─── No room check ───
if (!roomSlug && !isHost) {
  document.getElementById('nameTitle').textContent = t('no_room_title');
  document.getElementById('nameSubtitle').textContent = t('no_room_subtitle');
  document.getElementById('nameInput').style.display = 'none';
  document.getElementById('nameBtn').style.display = 'none';
}

// ─── SCREEN 1: Name ───
const nameInput = document.getElementById('nameInput');
const nameBtn = document.getElementById('nameBtn');
const nameError = document.getElementById('nameError');

nameInput.addEventListener('input', () => {
  nameBtn.disabled = !nameInput.value.trim();
});
nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && nameInput.value.trim()) nameBtn.click();
});

nameBtn.addEventListener('click', async () => {
  userName = nameInput.value.trim();
  if (!userName) return;

  nameBtn.disabled = true;
  nameError.style.display = 'none';

  // Unlock audio (Safari)
  unlockAudioPlayback();

  // Get token first
  const connecting = document.getElementById('connecting');
  const connectingText = document.getElementById('connectingText');
  connectingText.textContent = t('connecting');
  connecting.classList.add('show');

  try {
    if (isHost) {
      const data = await apiCall(`${API_URL}/rooms`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hostName: userName }),
      });
      userToken = data.token;
      userSlug = data.slug;
      history.replaceState(null, '', `?room=${userSlug}&lang=${lang}`);
    } else {
      const data = await apiCall(`${API_URL}/rooms/${roomSlug}/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: userName }),
      });
      userToken = data.token;
      userSlug = roomSlug;
    }

    connecting.classList.remove('show');

    // Check mic permission state
    const permState = await checkMicPermission();

    if (permState === 'granted') {
      // Already granted — skip mic screen, go straight to call
      await startCall(true);
    } else {
      // Show mic permission screen
      if (permState === 'denied') {
        showMicDeniedUI();
      }
      showScreen('screenMic');
    }
  } catch (err) {
    connecting.classList.remove('show');
    nameError.textContent = err.message || t('connect_error');
    nameError.style.display = 'block';
    nameBtn.disabled = false;
  }
});

// ─── SCREEN 2: Mic ───
const micRequestBtn = document.getElementById('micRequestBtn');
const micSkipBtn = document.getElementById('micSkipBtn');
const micHint = document.getElementById('micHint');
const micError = document.getElementById('micError');

function showMicDeniedUI() {
  document.getElementById('micTitle').textContent = t('mic_blocked_title');
  document.getElementById('micSubtitle').textContent = t('mic_blocked_subtitle');
  document.getElementById('micHintContent').innerHTML = getMicBlockedInstructions();
  micHint.classList.add('show');
  micRequestBtn.textContent = t('mic_try_again');
  document.getElementById('micIconBig').classList.remove('pulsing');
}

micRequestBtn.addEventListener('click', async () => {
  micRequestBtn.disabled = true;
  micError.style.display = 'none';

  // Debug: check what's available
  const debugInfo = [];
  debugInfo.push('secure: ' + window.isSecureContext);
  debugInfo.push('mediaDevices: ' + !!navigator.mediaDevices);
  debugInfo.push('getUserMedia: ' + !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));

  // Check for devices first
  if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const audioInputs = devices.filter(d => d.kind === 'audioinput');
      debugInfo.push('audio devices: ' + audioInputs.length);
      audioInputs.forEach((d, i) => debugInfo.push(`  mic${i}: ${d.label || '(no label)'} [${d.deviceId.slice(0,8)}]`));
    } catch (e) {
      debugInfo.push('enumerate error: ' + e.message);
    }
  }

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    micError.textContent = t('mic_not_supported') + ' ' + debugInfo.join(' | ');
    micError.style.display = 'block';
    micRequestBtn.disabled = false;
    return;
  }

  // Try getUserMedia with multiple constraint sets
  const constraintSets = [
    { audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } },
    { audio: true },
  ];

  for (let i = 0; i < constraintSets.length; i++) {
    try {
      debugInfo.push(`trying constraints ${i}...`);
      const stream = await navigator.mediaDevices.getUserMedia(constraintSets[i]);
      // Success!
      const tracks = stream.getAudioTracks();
      debugInfo.push(`got ${tracks.length} tracks: ${tracks.map(t => t.label).join(', ')}`);
      stream.getTracks().forEach(t => t.stop());
      await startCall(true);
      return;
    } catch (e) {
      debugInfo.push(`fail ${i}: ${e.name}: ${e.message}`);

      if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
        // Don't try more constraints — user denied
        showMicDeniedUI();
        micRequestBtn.disabled = false;
        return;
      }
      // Try next constraint set
    }
  }

  // All constraint sets failed
  micRequestBtn.disabled = false;
  const lastDebug = debugInfo.join('\n');
  console.error('All getUserMedia attempts failed:', lastDebug);

  // Show debug info temporarily to help diagnose
  micError.textContent = t('mic_error_access') + '\n' + debugInfo.filter(d => d.startsWith('fail') || d.startsWith('audio')).join(' | ');
  micError.style.display = 'block';
  micError.style.whiteSpace = 'pre-wrap';

  document.getElementById('micTitle').textContent = t('mic_not_found_title');
  document.getElementById('micSubtitle').textContent = t('mic_not_found_subtitle');
  document.getElementById('micIconBig').classList.remove('pulsing');
});

micSkipBtn.addEventListener('click', () => {
  startCall(false);
});

// ─── Start call ───
async function startCall(withMic) {
  const connecting = document.getElementById('connecting');
  connecting.classList.add('show');
  document.getElementById('connectingText').textContent = t('connecting_call');

  try {
    await connectToRoom(userToken, userSlug, withMic);
  } catch (err) {
    connecting.classList.remove('show');
    showScreen('screenMic');
    micError.textContent = t('connect_error');
    micError.style.display = 'block';
  }
}

async function connectToRoom(token, slug, withMic) {
  const { Room, RoomEvent, Track } = LivekitClient;

  room = new Room({
    adaptiveStream: true,
    dynacast: true,
    audioCaptureDefaults: {
      echoCancellation: true,
      noiseSuppression: true,
      autoGainControl: true,
    },
  });

  // Remote audio
  room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
    if (track.kind === Track.Kind.Audio) {
      const el = track.attach();
      el.id = `audio-${participant.sid}`;
      el.setAttribute('autoplay', '');
      el.setAttribute('playsinline', '');
      el.volume = 1.0;
      document.getElementById('audioContainer').appendChild(el);
      el.play().catch(() => {});
    }
  });

  room.on(RoomEvent.TrackUnsubscribed, (track, publication, participant) => {
    track.detach().forEach(el => el.remove());
    const el = document.getElementById(`audio-${participant.sid}`);
    if (el) el.remove();
  });

  room.on(RoomEvent.ParticipantConnected, () => updateParticipants());
  room.on(RoomEvent.ParticipantDisconnected, () => updateParticipants());
  room.on(RoomEvent.ActiveSpeakersChanged, (speakers) => updateSpeakers(speakers));
  room.on(RoomEvent.TrackMuted, () => updateParticipants());
  room.on(RoomEvent.TrackUnmuted, () => updateParticipants());

  room.on(RoomEvent.Disconnected, () => {
    stopTimer();
    document.querySelectorAll('.screen, .call-screen').forEach(s => s.classList.remove('active'));
    showScreen('screenName');
    document.getElementById('nameTitle').textContent = t('call_ended_title');
    document.getElementById('nameSubtitle').textContent = t('call_ended_subtitle');
    document.getElementById('nameInput').style.display = 'none';
    document.getElementById('nameBtn').style.display = 'none';
  });

  room.on(RoomEvent.MediaDevicesError, (e) => {
    console.error('MediaDevicesError:', e);
    showMicBanner('error', t('mic_unavailable'));
    setMicUI(true, false);
  });

  await room.connect(LIVEKIT_URL, token);

  // Show call UI
  document.getElementById('connecting').classList.remove('show');
  showScreen('screenCall');

  // Enable mic
  if (withMic) {
    try {
      await room.localParticipant.setMicrophoneEnabled(true);
      micAvailable = true;
      isMuted = false;
      setMicUI(false, true);
    } catch (e) {
      console.error('Mic enable failed in call:', e.name, e.message);
      micAvailable = false;
      isMuted = true;
      showMicBanner('warning', t('mic_enable_failed'));
      setMicUI(true, false);
    }
  } else {
    micAvailable = false;
    isMuted = true;
    showMicBanner('warning', t('mic_no_mic_warning'));
    setMicUI(true, false);
  }

  updateParticipants();
  startTimer();
}

function showMicBanner(type, text) {
  const b = document.getElementById('micBanner');
  b.textContent = text;
  b.className = 'mic-banner ' + type;
}

function setMicUI(muted, canToggle) {
  isMuted = muted;
  const btn = document.getElementById('muteBtn');
  document.getElementById('micOn').style.display = muted ? 'none' : 'block';
  document.getElementById('micOff').style.display = muted ? 'block' : 'none';
  btn.classList.toggle('muted', muted);
  btn.classList.toggle('no-mic', !canToggle);
}

function updateParticipants() {
  if (!room) return;
  const grid = document.getElementById('participantsGrid');
  const count = document.getElementById('participantCount');
  const all = [room.localParticipant, ...room.remoteParticipants.values()];

  count.textContent = `${all.length} ${all.length === 1 ? t('participant_1') : all.length < 5 ? t('participant_2_4') : t('participant_5')}`;

  grid.innerHTML = all.map(p => {
    const name = p.identity || t('guest');
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    const micOff = !p.isMicrophoneEnabled;
    const speaking = p.isSpeaking;
    const isLocal = p === room.localParticipant;

    return `
      <div class="participant" data-sid="${p.sid}">
        <div class="participant-avatar ${speaking ? 'speaking' : ''}">
          ${initials}
          ${micOff ? `<div class="muted-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </div>` : ''}
        </div>
        <div class="participant-name">${name}${isLocal ? ` (${t('you')})` : ''}</div>
      </div>
    `;
  }).join('');
}

function updateSpeakers(speakers) {
  if (!room) return;
  document.querySelectorAll('.participant-avatar').forEach(el => el.classList.remove('speaking'));
  const sids = new Set(speakers.map(s => s.sid));
  document.querySelectorAll('.participant').forEach(el => {
    if (sids.has(el.dataset.sid)) {
      el.querySelector('.participant-avatar').classList.add('speaking');
    }
  });
}

async function toggleMute() {
  if (!room) return;

  if (!micAvailable) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      await room.localParticipant.setMicrophoneEnabled(true);
      micAvailable = true;
      isMuted = false;
      document.getElementById('micBanner').className = 'mic-banner';
      setMicUI(false, true);
      updateParticipants();
    } catch (e) {
      console.warn('Still no mic:', e.message);
    }
    return;
  }

  isMuted = !isMuted;
  try {
    await room.localParticipant.setMicrophoneEnabled(!isMuted);
  } catch (e) {
    isMuted = !isMuted;
  }
  setMicUI(isMuted, true);
  updateParticipants();
}

function copyLink() {
  const slug = new URLSearchParams(window.location.search).get('room');
  if (!slug) return;
  const link = `${window.location.origin}${window.location.pathname}?room=${slug}&lang=${lang}`;
  navigator.clipboard.writeText(link).then(() => {
    document.getElementById('shareToast').classList.add('show');
    document.getElementById('copyText').textContent = t('copied');
    setTimeout(() => {
      document.getElementById('shareToast').classList.remove('show');
      document.getElementById('copyText').textContent = t('invite_btn');
    }, 2000);
  });
}

function leaveCall() { if (room) room.disconnect(); }

function startTimer() {
  timerSeconds = 0;
  timerInterval = setInterval(() => {
    timerSeconds++;
    const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
    const s = (timerSeconds % 60).toString().padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() { if (timerInterval) clearInterval(timerInterval); }
